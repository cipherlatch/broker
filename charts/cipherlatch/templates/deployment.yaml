apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cipherlatch.fullname" . }}
  labels:
    {{- include "cipherlatch.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cipherlatch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cipherlatch.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cipherlatch.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cipherlatch
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "cipherlatch.fullname" . }}
            - secretRef:
                name: {{ include "cipherlatch.secretName" . }}
          # Migrations run in the entrypoint under a Postgres advisory lock,
          # so N replicas starting simultaneously upgrade exactly once; the
          # readiness probe holds traffic until the schema + keystore are up.
          livenessProbe:
            httpGet: {path: /healthz, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: {path: /readyz, port: http}
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if and (eq .Values.keystore.type "file") .Values.persistence.enabled }}
          volumeMounts:
            - name: keys
              mountPath: /srv/data/keys
          {{- end }}
      {{- if and (eq .Values.keystore.type "file") .Values.persistence.enabled }}
      volumes:
        - name: keys
          persistentVolumeClaim:
            claimName: {{ include "cipherlatch.fullname" . }}-keys
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
