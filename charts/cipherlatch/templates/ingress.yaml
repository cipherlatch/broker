{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cipherlatch.fullname" . }}
  labels:
    {{- include "cipherlatch.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ include "cipherlatch.ingressHost" . | quote }}]
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "cipherlatch.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ include "cipherlatch.ingressHost" . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cipherlatch.fullname" . }}
                port:
                  name: http
{{- end }}
