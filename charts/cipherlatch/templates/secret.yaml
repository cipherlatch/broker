{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cipherlatch.fullname" . }}
  labels:
    {{- include "cipherlatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  BROKER_DATABASE_URL: {{ required "secrets.databaseUrl is required (or use secrets.existingSecret)" .Values.secrets.databaseUrl | quote }}
  BROKER_ADMIN_API_KEY: {{ required "secrets.adminApiKey is required (or use secrets.existingSecret)" .Values.secrets.adminApiKey | quote }}
  BROKER_SESSION_SECRET: {{ required "secrets.sessionSecret is required (or use secrets.existingSecret)" .Values.secrets.sessionSecret | quote }}
  {{- with .Values.secrets.credentialKey }}
  BROKER_CREDENTIAL_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.oidcClientId }}
  BROKER_OIDC_CLIENT_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.oidcClientSecret }}
  BROKER_OIDC_CLIENT_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.vaultToken }}
  BROKER_VAULT_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
