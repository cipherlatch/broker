# Cipherlatch load balancer for docker-compose.ha.yml.
# Docker's embedded DNS (127.0.0.11) returns every healthy cipherlatch-app replica;
# re-resolving per request (resolver + variable) spreads load and drops
# replicas that leave DNS when their healthcheck fails.

server {
    listen 8000;

    resolver 127.0.0.11 valid=5s ipv6=off;
    set $upstream http://cipherlatch-app:8000;

    location / {
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }
}
