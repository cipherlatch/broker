# Multi-replica deployment on a single Docker host.
#
#   docker compose -f docker-compose.ha.yml -p cipherlatch up -d --build
#
# Topology: reverse proxy -> cipherlatch (nginx LB; stable container name for the proxy upstream)
#           -> N cipherlatch-app replicas -> cipherlatch-db.
#
# Requirements for replicas:
#  - BROKER_KEYSTORE=vault (or another shared backend) so replicas sign with
#    the same key. The file backend would give each replica its own key.
#  - Postgres (not SQLite). Migrations serialize via a pg advisory lock.
# Sessions are signed cookies and lockout state lives in the DB, so no sticky
# sessions are needed. True multi-node failover wants Kubernetes or Swarm —
# the app is stateless-ready; see ARCHITECTURE.md "Scaling & HA".

services:
  cipherlatch:
    image: nginx:1.27-alpine
    container_name: cipherlatch
    volumes:
      - ./deploy/lb/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cipherlatch-app
    restart: unless-stopped
    networks:
      - default
      - edge
    ports:
      - "8400:8000"

  cipherlatch-app:
    build: .
    deploy:
      replicas: 2
    environment:
      BROKER_DATABASE_URL: postgresql+psycopg://broker:${POSTGRES_PASSWORD:?}@db:5432/broker
      BROKER_ADMIN_API_KEY: ${BROKER_ADMIN_API_KEY:?}
      BROKER_ISSUER: ${BROKER_ISSUER:?}
      BROKER_DB_AUTO_CREATE: "false"
      BROKER_KEYSTORE: ${BROKER_KEYSTORE:-vault}
      BROKER_VAULT_ADDR: ${BROKER_VAULT_ADDR:-}
      BROKER_VAULT_TOKEN: ${BROKER_VAULT_TOKEN:-}
      BROKER_VAULT_MOUNT: ${BROKER_VAULT_MOUNT:-secret}
      BROKER_VAULT_PATH: ${BROKER_VAULT_PATH:-cipherlatch/signing-key}
      BROKER_OIDC_ISSUER: ${BROKER_OIDC_ISSUER:-}
      BROKER_OIDC_CLIENT_ID: ${BROKER_OIDC_CLIENT_ID:-}
      BROKER_OIDC_CLIENT_SECRET: ${BROKER_OIDC_CLIENT_SECRET:-}
      BROKER_SESSION_SECRET: ${BROKER_SESSION_SECRET:-}
      BROKER_JIT_PROVISIONING: ${BROKER_JIT_PROVISIONING:-true}
      BROKER_ADMIN_EMAILS: ${BROKER_ADMIN_EMAILS:-}
      BROKER_ADMIN_EMAIL_PINNING: ${BROKER_ADMIN_EMAIL_PINNING:-true}
      BROKER_UI_ACCENT: ${BROKER_UI_ACCENT:-#6d5efc}
      TZ: ${TZ:-America/New_York}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

  db:
    image: postgres:16-alpine
    container_name: cipherlatch-db
    environment:
      POSTGRES_USER: broker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: broker
      TZ: ${TZ:-America/New_York}
    volumes:
      - ${DATA_DIR:-./data}/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U broker"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - default

networks:
  default:
  edge:
    external: true
    name: ${EDGE_NETWORK:-edge}
